<div class="password-manager">
  <h2>Password Manager</h2>

  <!-- Forma za dodavanje lozinke -->
  <form (ngSubmit)="addPassword()">
    <input type="text" [(ngModel)]="userEmail" name="email" placeholder="Email" required>
    <input type="text" [(ngModel)]="siteName" name="siteName" placeholder="Site Name" required>
    <input type="text" [(ngModel)]="username" name="username" placeholder="Username" required>
    <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required>
    <button type="submit" mat-raised-button color="primary">Add Password</button>
  </form>

  <hr>

  <!-- Privatni ključ i dugme za učitavanje lozinki -->
  <input type="file" (change)="loadPrivateKey($event)" accept=".pem">
  <button (click)="loadPasswords()" mat-raised-button color="accent">Load Passwords</button>

  <!-- Lista lozinki -->
  <ul>
    <li *ngFor="let entry of passwords">
      {{ entry.siteName }} ({{ entry.username }})
      <button (click)="decryptPassword(entry)" mat-button color="primary">Decrypt</button>
      <span *ngIf="decryptedPasswords[entry.id!.toString()]">
        → {{ decryptedPasswords[entry.id!.toString()] }}
      </span>
    </li>
  </ul>

  <!-- Privatni ključ za dekripciju -->
  <h3>Privatni ključ (PEM) za dekripciju:</h3>
  <textarea rows="8" cols="70" [(ngModel)]="privateKeyPem" readonly></textarea>

  <button mat-button color="warn" (click)="close()">Close</button>
</div>
